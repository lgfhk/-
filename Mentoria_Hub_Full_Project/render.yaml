services:
  - type: web
    name: mentoria-hub
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_PATH
        value: /var/data/db.json
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: mentoria-data
      mountPath: /var/data
      sizeGB: 1
