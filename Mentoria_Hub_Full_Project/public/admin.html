<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Админ-панель — Mentoria Hub</title><link rel="stylesheet" href="/styles.css"><script src="/app.js" defer></script></head><body data-page="admin"><header id="siteHeader"></header><main><section class="page-hero admin-hero compact"><div class="page-wrap"><span class="eyebrow light"><i></i> Панель управления</span><div class="dashboard-welcome"><div><h1>Контент и сообщество</h1><p>Добавляйте проверенные возможности без пересборки сайта.</p></div><button class="button white" type="button" id="openOpportunityForm">+ Новая возможность</button></div></div></section><section class="page-wrap admin-body"><div id="adminStats" class="stats-grid"></div><div class="admin-layout"><section class="content-panel"><div class="panel-title"><div><span class="eyebrow"><i></i> Каталог</span><h2>Возможности</h2></div></div><div id="adminOpportunityList" class="admin-list"></div></section><section class="content-panel"><div class="panel-title"><div><span class="eyebrow"><i></i> Пользователи</span><h2>Участники</h2></div></div><div id="adminUserList" class="admin-list"></div></section></div></section><dialog id="opportunityDialog" class="modal"><button class="modal-close" data-close-dialog aria-label="Закрыть">×</button><form id="adminOpportunityForm" class="form-stack"><div><span class="eyebrow"><i></i> Возможность</span><h2>Добавить в каталог</h2></div><div class="form-grid"><label class="span-two">Название<input name="title" required></label><label>Организатор<input name="organizer" required></label><label>Категория<input name="category" placeholder="Олимпиада" required></label><label>Направление<input name="direction" placeholder="STEM" required></label><label>Дедлайн<input name="deadline" type="datetime-local" required></label><label>Классы<input name="grades" placeholder="8,9,10,11" required></label><label>Возраст<input name="ages" placeholder="13–18 лет"></label><label>Стоимость<input name="fee" value="Бесплатно"></label><label>Язык<input name="language" value="Английский"></label><label>Приз<input name="prize"></label><label class="span-two">Официальная ссылка<input name="url" type="url" placeholder="https://…" required></label><label class="span-two">Описание<textarea name="description" rows="4" required></textarea></label><label class="span-two">Требования — по одному в строке<textarea name="requirements" rows="4"></textarea></label></div><button class="button primary full">Опубликовать</button></form></dialog></main><footer id="siteFooter"></footer><div id="toast" class="toast" role="status"></div></body></html>
