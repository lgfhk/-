<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Профиль — Mentoria Hub</title><link rel="stylesheet" href="/styles.css"><script src="/app.js" defer></script></head><body data-page="profile"><header id="siteHeader"></header><main><section class="page-hero profile-hero compact"><div class="page-wrap"><span class="eyebrow light"><i></i> Настройки</span><h1>Профиль и интересы</h1><p>Чем точнее профиль, тем полезнее рекомендации.</p></div></section><section class="page-wrap profile-layout"><aside class="profile-card" id="profileSummary"></aside><form id="profileForm" class="content-panel form-stack"><div><span class="eyebrow"><i></i> Основное</span><h2>Ваши данные</h2></div><div class="form-grid"><label>Имя<input name="name" required minlength="2"></label><label>Класс<select name="grade"><option value="8">8 класс</option><option value="9">9 класс</option><option value="10">10 класс</option><option value="11">11 класс</option></select></label><label class="span-two">Страна<input name="country"></label></div><fieldset><legend>Интересы</legend><div class="choice-chips" data-interest-picker><label><input type="checkbox" value="STEM"><span>STEM</span></label><label><input type="checkbox" value="Математика"><span>Математика</span></label><label><input type="checkbox" value="Английский"><span>Английский</span></label><label><input type="checkbox" value="Поступление"><span>Поступление</span></label><label><input type="checkbox" value="Социальное влияние"><span>Соц. проекты</span></label><label><input type="checkbox" value="Международные отношения"><span>Международные отношения</span></label></div></fieldset><fieldset><legend>Цели</legend><div class="choice-chips" data-goal-picker><label><input type="checkbox" value="Поступить в университет"><span>Поступление</span></label><label><input type="checkbox" value="Победа в олимпиаде"><span>Олимпиада</span></label><label><input type="checkbox" value="Сильное портфолио"><span>Портфолио</span></label><label><input type="checkbox" value="Улучшить английский"><span>Английский</span></label></div></fieldset><div class="button-row"><button class="button primary" type="submit">Сохранить изменения</button><button class="button danger" type="button" data-logout>Выйти из аккаунта</button></div></form></section></main><footer id="siteFooter"></footer><div id="toast" class="toast" role="status"></div></body></html>
